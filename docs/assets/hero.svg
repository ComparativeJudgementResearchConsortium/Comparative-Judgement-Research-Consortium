<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="600" viewBox="0 0 1600 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Comparative Judgement Research Consortium hero</title>
  <desc id="desc">Abstract geometric hero with gradient and text: Comparative Judgement Research Consortium</desc>
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#0ea5a6"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="f1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="b"/>
      <feBlend in="SourceGraphic" in2="b" mode="normal"/>
    </filter>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>

  <!-- background gradient -->
  <rect width="1600" height="600" fill="url(#g1)" />

  <!-- soft light overlay -->
  <rect width="1600" height="600" fill="url(#g2)"/>

  <!-- large abstract shapes -->
  <g fill-opacity="0.9" filter="url(#f1)">
    <ellipse cx="1200" cy="100" rx="420" ry="220" fill="#ffffff" fill-opacity="0.06"/>
    <ellipse cx="300" cy="420" rx="420" ry="260" fill="#000000" fill-opacity="0.06"/>
  </g>

  <!-- layered polygons -->
  <g transform="translate(80,60)">
    <polygon points="0,220 240,40 520,180 360,340" fill="#ffffff" fill-opacity="0.06" />
    <polygon points="420,0 920,40 720,280 340,200" fill="#ffffff" fill-opacity="0.03" />
  </g>

  <!-- decorative dots pattern -->
  <rect x="40" y="40" width="300" height="180" fill="url(#dots)" />

  <!-- central content block -->
  <g transform="translate(80,120)">
    <rect x="0" y="0" width="1440" height="360" rx="12" ry="12" fill="transparent" />

    <!-- title -->
    <text x="40" y="110" font-family="Inter, Roboto, -apple-system, system-ui, 'Segoe UI', 'Helvetica Neue', Arial" font-size="46" fill="#ffffff" font-weight="700">Comparative Judgement</text>
    <text x="40" y="170" font-family="Inter, Roboto, -apple-system, system-ui, 'Segoe UI', 'Helvetica Neue', Arial" font-size="28" fill="#e6f0ff" font-weight="500">Research Consortium</text>

    <!-- tagline -->
    <text x="40" y="220" font-family="Inter, Roboto, -apple-system, system-ui, 'Segoe UI', 'Helvetica Neue', Arial" font-size="18" fill="#dbeafe">A collaborative collection of comparative-judgement datasets and resources</text>

    <!-- CTA-like subtle pill -->
    <g transform="translate(40,250)">
      <rect x="0" y="0" width="220" height="44" rx="22" fill="#ffffff" fill-opacity="0.12" />
      <text x="20" y="30" font-family="Inter, Roboto, -apple-system, system-ui, 'Segoe UI', 'Helvetica Neue', Arial" font-size="16" fill="#ffffff">Explore datasets →</text>
    </g>
  </g>

  <!-- small watermark acronym -->
  <text x="1360" y="560" font-family="Inter, Roboto, -apple-system, system-ui, 'Segoe UI', 'Helvetica Neue', Arial" font-size="28" fill="#ffffff" fill-opacity="0.12" font-weight="700">CJRC</text>

</svg>
